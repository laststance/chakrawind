name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  m0-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify baseline dependency lock
        run: pnpm baseline:lock:verify

      - name: Verify parity baseline manifests
        run: pnpm parity:baseline:verify

      - name: Run M1 gate command shells
        run: pnpm test:m1:gates

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
